name: Release & Deploy

on:
  push:
    branches: [main] # CHANGE TO [master] IF YOUR PRIMARY BRANCH IS MASTER
  pull_request:
    branches: [main] # CHANGE TO [master] IF YOUR PRIMARY BRANCH IS MASTER

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write # REQUIRED FOR WORKLOAD IDENTITY FEDERATION

env:
  PROJECT_ID: ops-data-technology-uat
  REGION: northamerica-northeast1
  SERVICE_NAME: oct-website-uat
  REPOSITORY: cloud-run-source-res
  IMAGE_NAME: oct-website-image

jobs:
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --legacy-peer-deps
      - name: Validate commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha || github.event.before }} --to ${{ github.event.pull_request.head.sha || github.sha }} --verbose

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Debug Files
        run: |
          ls -la
          node -v
          npm -v
      - run: npm install --legacy-peer-deps
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Lint
        run: npx next lint -- .
      - name: Unit Tests
        run: npm test
      - name: Build
        run: npm run build

  release:
    name: Semantic Release
    needs: [commitlint, quality]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # REPLACEMENT JOB: GCP DEPLOYMENT
  deploy:
    name: Build & Deploy to GCP
    needs: release
    # Only deploy if a push happened to the main branch
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" .
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: --add-cloudsql-instances=ops-data-technology-uat:northamerica-northeast1:coe-uat-instance