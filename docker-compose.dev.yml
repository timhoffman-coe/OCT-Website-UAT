services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coe_cms
      POSTGRES_USER: coe_admin
      POSTGRES_PASSWORD: dev_password
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coe_admin -d coe_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
      - DATABASE_URL=postgresql://coe_admin:dev_password@postgres:5432/coe_cms
      - DEV_BYPASS_IAP=true
      - DEV_USER_EMAIL=dev@edmonton.ca
      - DEV_USER_NAME=Dev User
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_dev:
