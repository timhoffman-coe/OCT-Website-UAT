services:
  postgres:
    image: postgres:16-alpine
    env_file: .env.local
    environment:
      POSTGRES_DB: coe_cms
      POSTGRES_USER: coe_admin
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coe_admin -d coe_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env.local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
      # OpenTelemetry — point at the local collector sidecar. Set
      # OTEL_SDK_DISABLED=true to skip telemetry entirely if the collector
      # isn't running.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=coe-website
      - OTEL_LOG_LEVEL=warn
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"   # OTLP/HTTP receiver
      - "4317:4317"   # OTLP/gRPC receiver (unused but exposed)
    restart: unless-stopped

volumes:
  pgdata_dev:
