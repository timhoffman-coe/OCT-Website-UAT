services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coe_cms
      POSTGRES_USER: coe_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coe_admin -d coe_cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/jmcgilliscoe/oct-website:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://coe_admin:${POSTGRES_PASSWORD}@postgres:5432/coe_cms
      - GCP_PROJECT_ID=ops-data-technology-dev
      # Non-secret config (set values as needed)
      - MSSQL_SERVER=${MSSQL_SERVER:-}
      - MSSQL_DATABASE=${MSSQL_DATABASE:-}
      - MSSQL_PORT=${MSSQL_PORT:-1433}
      - MSSQL_DOMAIN=${MSSQL_DOMAIN:-}
      - MSSQL_ENCRYPT=${MSSQL_ENCRYPT:-true}
      - MSSQL_TRUST_CERT=${MSSQL_TRUST_CERT:-false}
      - SERVICEHEALTH_API_BASE_URL=${SERVICEHEALTH_API_BASE_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - news-content:/app/content/news
      - news-images:/app/public/images/news
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  news-content:
  news-images:
